services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: haushaltsbuch
      POSTGRES_USER: haushalt
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haushalt -d haushaltsbuch"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/boernie77/haushaltsbuch-home-backend:latest
    restart: unless-stopped
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://haushalt:${DB_PASSWORD}@db:5432/haushaltsbuch
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PORT: "3000"
      NODE_ENV: production
      APP_URL: ${APP_URL}
      ALLOWED_ORIGINS: ${APP_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - ./data/uploads:/app/uploads

  web:
    image: ghcr.io/boernie77/haushaltsbuch-home-web:latest
    restart: unless-stopped
    pull_policy: always
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-8481}:80"

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
    command: --interval 86400
