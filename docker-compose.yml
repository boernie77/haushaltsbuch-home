version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: haushaltsbuch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: haushaltsbuch
      POSTGRES_USER: haushalt
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haushalt -d haushaltsbuch"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: haushaltsbuch-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://haushalt:${DB_PASSWORD}@db:5432/haushaltsbuch
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      NODE_ENV: production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      APP_URL: ${APP_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    volumes:
      - uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  web:
    build: ./web
    container_name: haushaltsbuch-web
    restart: unless-stopped
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:3000/api}
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  db_data:
  uploads:
