services:
  db:
    image: postgres:16-alpine
    container_name: haushaltsbuch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: haushaltsbuch
      POSTGRES_USER: haushalt
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haushalt -d haushaltsbuch"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: haushaltsbuch-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://haushalt:${DB_PASSWORD}@db:5432/haushaltsbuch
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      NODE_ENV: production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      APP_URL: ${APP_URL}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - uploads:/app/uploads
    ports:
      - "3001:3000"

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ${API_URL}
    container_name: haushaltsbuch-web
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  db_data:
  uploads:
