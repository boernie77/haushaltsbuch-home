name: Deploy to Hetzner VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.104.130.161
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/haushaltsbuch
            git pull origin main

            # .env: nur bekannte Secrets aktualisieren, alle anderen Zeilen (SMTP, ENCRYPTION_KEY usw.) bleiben erhalten
            touch .env
            set_env() {
              local key="$1" val="$2"
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                echo "${key}=${val}" >> .env
              fi
            }
            set_env DB_PASSWORD "${{ secrets.DB_PASSWORD }}"
            set_env JWT_SECRET "${{ secrets.JWT_SECRET }}"
            set_env ANTHROPIC_API_KEY "${{ secrets.ANTHROPIC_API_KEY }}"
            set_env ALLOWED_ORIGINS "https://haushalt.bernauer24.com"
            set_env APP_URL "https://haushalt.bernauer24.com"
            set_env API_URL "https://haushalt.bernauer24.com/api"

            docker-compose build --no-cache
            docker-compose up -d

            # Build-Cache nach jedem Deploy bereinigen (verhindert Ansammlung von >20 GB)
            docker builder prune -f

            # Warten bis Backend wirklich bereit ist (max. 60s)
            echo "Warte auf Backend..."
            for i in $(seq 1 60); do
              if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
                echo "Backend bereit nach ${i}s"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "Backend-Start-Timeout nach 60s — Logs:"
                docker-compose logs backend --tail=30
                exit 1
              fi
              sleep 1
            done

            docker-compose exec -T backend node src/utils/migrate.js
            docker-compose exec -T backend node -e "
              const { seedSystemCategories } = require('./src/utils/seedCategories');
              seedSystemCategories().then(() => process.exit(0)).catch(() => process.exit(0));
            "

            # Post-Deploy Health Check
            echo "Finaler Health Check..."
            HEALTH=$(curl -sf http://localhost:3001/api/health 2>/dev/null)
            if echo "$HEALTH" | grep -q '"status":"ok"'; then
              echo "Health Check OK: $HEALTH"
            else
              echo "Health Check FEHLGESCHLAGEN: $HEALTH"
              exit 1
            fi

            echo "Deploy erfolgreich abgeschlossen"
