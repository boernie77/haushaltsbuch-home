name: Deploy to Hetzner VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.104.130.161
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/haushaltsbuch
            git pull origin main

            # .env: nur bekannte Secrets aktualisieren, alle anderen Zeilen (SMTP, ENCRYPTION_KEY usw.) bleiben erhalten
            touch .env
            set_env() {
              local key="$1" val="$2"
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                echo "${key}=${val}" >> .env
              fi
            }
            set_env DB_PASSWORD "${{ secrets.DB_PASSWORD }}"
            set_env JWT_SECRET "${{ secrets.JWT_SECRET }}"
            set_env ANTHROPIC_API_KEY "${{ secrets.ANTHROPIC_API_KEY }}"
            set_env ALLOWED_ORIGINS "https://haushalt.bernauer24.com"
            set_env APP_URL "https://haushalt.bernauer24.com"
            set_env API_URL "https://haushalt.bernauer24.com/api"

            docker-compose build --no-cache
            docker-compose up -d
            sleep 8
            docker-compose exec -T backend node src/utils/migrate.js
            docker-compose exec -T backend node -e "
              const { seedSystemCategories } = require('./src/utils/seedCategories');
              seedSystemCategories().then(() => process.exit(0)).catch(() => process.exit(0));
            "
            echo "Done"
