name: Deploy to Hetzner VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 37.27.193.27
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/haushaltsbuch
            git pull origin main

            # .env neu schreiben
            cat > .env << 'ENVEOF'
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            ALLOWED_ORIGINS=https://haushalt.bernauer24.com
            APP_URL=https://haushalt.bernauer24.com
            API_URL=https://haushalt.bernauer24.com/api
            ENVEOF

            docker-compose build --no-cache
            docker-compose up -d
            sleep 8
            docker-compose exec -T backend node src/utils/migrate.js
            docker-compose exec -T backend node -e "require('./src/utils/seedCategories').seedSystemCategories()" || true
            echo "✅ Deployment erfolgreich"
